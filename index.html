  <style>
    /* ── BASE RESET ── */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;width:100%}
    body{font-family:'Nunito',sans-serif;background:#f4f6fb;color:#111827;-webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%}
    #root{min-height:100vh;display:flex;flex-direction:column}
    /* prevent zoom on input focus on iOS */
    input,textarea,select{font-size:16px}

    /* ── RANK ICONS — all same visual height, width auto ──
       Works for all SVGs regardless of internal viewBox size */
    img.rank-icon    {height:16px;width:auto;display:inline-block;vertical-align:middle;object-fit:contain;flex-shrink:0}
    img.rank-icon-xs {height:11px;width:auto;display:inline-block;vertical-align:middle;object-fit:contain;flex-shrink:0}
    img.rank-icon-sm {height:14px;width:auto;display:inline-block;vertical-align:middle;object-fit:contain;flex-shrink:0}
    img.rank-icon-md {height:20px;width:auto;display:inline-block;vertical-align:middle;object-fit:contain;flex-shrink:0}
    img.rank-icon-lg {height:28px;width:auto;display:inline-block;vertical-align:middle;object-fit:contain;flex-shrink:0}
    img.rank-icon-xl {height:40px;width:auto;display:inline-block;vertical-align:middle;object-fit:contain;flex-shrink:0}

    /* ── UI ICONS — monochrome interface icons ── */
    img.ui-icon   {width:18px;height:18px;object-fit:contain;display:inline-block;vertical-align:middle;flex-shrink:0;opacity:.85}
    img.ui-icon-sm{width:14px;height:14px;object-fit:contain;display:inline-block;vertical-align:middle;flex-shrink:0;opacity:.85}
    img.ui-icon-lg{width:22px;height:22px;object-fit:contain;display:inline-block;vertical-align:middle;flex-shrink:0;opacity:.85}

    /* ── STATUS DOTS ── */
    img.status-dot{width:9px;height:9px;border-radius:50%;display:inline-block;flex-shrink:0}

    /* ── GIFT ICONS ── */
    img.gift-icon{width:44px;height:44px;object-fit:contain;display:block}
    img.gift-icon-sm{width:28px;height:28px;object-fit:contain;display:block}

    /* ── BADGE ICONS ── */
    img.badge-icon{width:24px;height:24px;object-fit:contain;display:inline-block;vertical-align:middle}

    /* scrollbar */
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:#c1c1c1;border-radius:4px}
  </style>
